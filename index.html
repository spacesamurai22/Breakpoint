<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Breakpoint">
<meta name="theme-color" content="#15130F">
<meta name="color-scheme" content="dark">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<title>Breakpoint — Ultimate Game Log</title>
<style>
  :root{
    color-scheme: dark;
    --bg:#15130F; --ink:#F4EFE4; --ink-dim:#948C7C;
    --us:#FF5A33; --them:#4D9FFF; --timeout:#FFC233;
    --line: rgba(244,239,228,0.1);
    --panel: rgba(244,239,228,0.05);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ height:100%; margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui,sans-serif;
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    touch-action:manipulation; overscroll-behavior:none; }
  #app{ min-height:100dvh; display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  [hidden]{ display:none !important; }
  button{ font-family:inherit; }
  input{ font-family:inherit; }

  /* ---------- Setup ---------- */
  #setup-view{ flex:1; display:flex; flex-direction:column; padding:28px 22px; overflow-y:auto; }
  .eyebrow{ font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-dim); font-weight:700; }
  h1{ margin:4px 0 26px; font-size:36px; letter-spacing:-0.02em; font-weight:800; }
  .field-label{ font-size:13px; color:var(--ink-dim); font-weight:600; letter-spacing:.04em; text-transform:uppercase; margin:22px 0 8px; }
  .field-label:first-of-type{ margin-top:0; }
  .name-row{ display:flex; gap:10px; }
  .name-input{ flex:1; min-width:0; padding:14px; border-radius:12px; border:1.5px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:17px; font-weight:700; }
  .name-input.us{ border-color:rgba(255,90,51,.5); }
  .name-input.them{ border-color:rgba(77,159,255,.5); }
  .choice-row{ display:flex; gap:8px; }
  .choice-btn{ flex:1; padding:14px 8px; border-radius:12px; border:1.5px solid var(--line); background:transparent;
    color:var(--ink); font-size:14px; font-weight:700; text-align:center; line-height:1.3; }
  .choice-btn.active{ background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .stepper-row{ display:flex; align-items:center; justify-content:space-between; padding:6px 2px; }
  .stepper{ display:flex; align-items:center; gap:14px; }
  .stepper button{ width:40px; height:40px; border-radius:50%; border:1px solid rgba(244,239,228,0.25);
    background:transparent; color:var(--ink); font-size:22px; line-height:1; display:flex; align-items:center; justify-content:center; }
  .stepper button:active{ background:rgba(244,239,228,0.12); }
  .stepper .val{ min-width:46px; text-align:center; font-variant-numeric:tabular-nums;
    font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:20px; font-weight:700; }
  .start-btn{ margin-top:30px; width:100%; padding:18px; border-radius:16px; background:var(--us); color:#1A0A02;
    font-size:18px; font-weight:800; letter-spacing:.02em; border:none; }
  .start-btn:active{ filter:brightness(.92); }
  .secondary-btn{ width:100%; padding:16px; border-radius:16px; background:var(--panel); border:1.5px solid var(--line);
    color:var(--ink); font-size:16px; font-weight:700; letter-spacing:.02em; }
  .secondary-btn:active{ background:rgba(244,239,228,0.1); }

  /* ---------- Game view ---------- */
  #game-view{ flex:1; display:flex; flex-direction:column; min-height:0; }
  .top-bar{ display:flex; justify-content:space-between; align-items:center; padding:14px 18px 6px; }
  .text-btn{ background:none; border:none; color:var(--ink-dim); font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:8px; }
  .top-bar .point-label{ font-size:13px; color:var(--ink-dim); font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:8px; }

  .scoreboard{ display:flex; padding:6px 18px 0; gap:10px; }
  .team-card{ flex:1; border-radius:20px; padding:18px 12px; min-width:0; border:none; text-align:center;
    transition:opacity .2s ease, transform .12s ease, box-shadow .2s ease; }
  .team-card.us{ background:var(--us); }
  .team-card.them{ background:var(--them); }
  .team-card:active{ transform:scale(.96); }
  .team-card.waiting{ opacity:.42; }
  .team-card.active-poss{ box-shadow:0 0 0 3px rgba(244,239,228,.4), 0 0 22px rgba(244,239,228,.18); animation:cardpulse 1.8s ease-in-out infinite; }
  @keyframes cardpulse{
    0%,100%{ box-shadow:0 0 0 3px rgba(244,239,228,.32), 0 0 16px rgba(244,239,228,.12); }
    50%{ box-shadow:0 0 0 3px rgba(244,239,228,.6), 0 0 26px rgba(244,239,228,.28); }
  }
  .frisbee-badge{ width:30px; height:16px; border-radius:50%; background:var(--ink); margin:0 auto 8px;
    opacity:0; transition:opacity .2s ease; box-shadow:inset 0 0 0 3px rgba(21,19,15,.18), 0 1px 4px rgba(0,0,0,.25); }
  .team-card.active-poss .frisbee-badge{ opacity:1; }
  .team-card .tname{ font-size:13px; font-weight:700; letter-spacing:.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:rgba(21,19,15,.7); }
  .team-card .tscore{ font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:clamp(46px,15vw,68px); font-weight:800; line-height:1; margin:6px 0; color:#15130F; }
  .team-card .taction{ font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:rgba(21,19,15,.6); min-height:14px; }

  .timeouts-row{ display:flex; gap:8px; padding:10px 18px 0; }
  .to-btn{ flex:1; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; padding:12px 8px;
    border-radius:12px; border:1px solid var(--line); background:var(--panel); color:var(--ink); text-align:center;
    font-variant-numeric:tabular-nums; }
  .to-btn:disabled{ opacity:.35; }
  .halftime-btn{ flex:0 0 auto; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; padding:12px 10px;
    border-radius:12px; border:1px solid var(--line); background:transparent; color:var(--ink-dim); white-space:nowrap; }
  .halftime-btn:disabled{ opacity:.3; }

  .status-banner{ margin:4px 18px 12px; padding:13px 16px; border-radius:14px; background:var(--panel); border:1.5px solid var(--line);
    text-align:center; font-size:15px; font-weight:800; letter-spacing:.01em; color:var(--ink); }
  .status-banner.accent-us{ border-color:rgba(255,90,51,.55); background:rgba(255,90,51,.1); color:var(--us); }
  .status-banner.accent-them{ border-color:rgba(77,159,255,.55); background:rgba(77,159,255,.1); color:var(--them); }

  .halftime-divider{ display:flex; align-items:center; gap:10px; margin:14px 0; }
  .halftime-divider::before, .halftime-divider::after{ content:''; flex:1; height:1px; background:var(--line); }
  .halftime-divider span{ font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-dim); white-space:nowrap; }

  .undo-row{ padding:12px 18px 0; }
  .undo-btn{ width:100%; padding:14px; border-radius:14px; background:var(--panel); border:1.5px solid var(--line);
    color:var(--ink); font-size:14px; font-weight:700; letter-spacing:.02em; text-align:center; }
  .undo-btn:active{ background:rgba(244,239,228,0.1); }
  .undo-btn:disabled{ opacity:.3; }
  .undo-btn .undo-icon{ display:none; font-size:18px; line-height:1; }

  .tabs{ display:flex; gap:6px; padding:6px 18px; }
  .tab-btn{ flex:1; padding:10px; border-radius:10px; border:none; background:transparent; color:var(--ink-dim);
    font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
  .tab-btn.active{ background:var(--panel); color:var(--ink); }

  .panel{ flex:1; overflow-y:auto; padding:8px 18px 24px; }

  .subtoggle{ display:flex; gap:6px; margin-bottom:14px; }
  .subtoggle button{ flex:1; padding:9px; border-radius:9px; border:none; background:transparent; color:var(--ink-dim);
    font-size:12px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
  .subtoggle button.active{ background:var(--panel); color:var(--ink); }
  .stat-section-label{ font-size:12px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; margin:16px 0 2px; color:var(--ink-dim); }
  .stat-section-label:first-child{ margin-top:0; }

  .stat-row{ display:flex; justify-content:space-between; align-items:baseline; padding:13px 0; border-bottom:1px solid var(--line); }
  .stat-row .label{ font-size:14px; color:var(--ink-dim); font-weight:600; }
  .stat-row .value{ font-size:16px; font-weight:700; font-variant-numeric:tabular-nums; text-align:right; }
  .stat-row .value .pct{ color:var(--ink-dim); font-weight:600; font-size:13px; margin-left:4px; }

  .cmp-header{ display:flex; justify-content:space-between; padding:0 2px 10px; }
  .cmp-header span{ font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; }
  .cmp-header .us{ color:var(--us); }
  .cmp-header .them{ color:var(--them); }
  .cmp-row{ display:flex; align-items:center; padding:13px 0; border-bottom:1px solid var(--line); gap:6px; }
  .cmp-val{ flex:1 1 0; min-width:0; font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; }
  .cmp-val.left{ text-align:left; }
  .cmp-val.right{ text-align:right; }
  .cmp-val .pct{ color:var(--ink-dim); font-weight:600; font-size:12px; }
  .cmp-label{ flex:0 1 auto; text-align:center; font-size:11px; color:var(--ink-dim); font-weight:600; padding:0 4px; line-height:1.25; }

  .point-entry{ padding:12px 0; border-bottom:1px solid var(--line); }
  .point-entry .pe-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .point-entry .pe-num{ font-size:13px; font-weight:700; color:var(--ink-dim); letter-spacing:.03em; text-transform:uppercase; }
  .pe-right{ text-align:right; }
  .pe-outcome{ font-size:13px; font-weight:700; }
  .pe-runscore{ font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:13px; color:var(--ink-dim); margin-top:2px; }
  .pe-dots{ display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .dot.us{ background:var(--us); }
  .dot.them{ background:var(--them); }
  .dot.to{ width:9px; height:9px; border-radius:3px; background:var(--timeout); transform:rotate(45deg); }
  .dot.final{ width:13px; height:13px; box-shadow:0 0 0 2px rgba(244,239,228,.3); }
  .empty-note{ color:var(--ink-dim); font-size:14px; text-align:center; padding:30px 10px; }

  /* ---------- Summary view ---------- */
  #summary-view{ flex:1; display:flex; flex-direction:column; min-height:0; }
  .summary-header{ text-align:center; padding:18px 22px 8px; }
  .summary-score{ font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:54px; font-weight:800; margin:6px 0 4px; }
  .summary-names{ font-size:14px; color:var(--ink-dim); font-weight:600; }
  .summary-actions{ display:flex; flex-direction:column; gap:10px; padding:6px 18px 24px; }

  /* ---------- Landscape: glanceable scoreboard, plus banner + undo ---------- */
  @media (orientation: landscape) and (max-height: 600px){
    #game-view > *:not(.scoreboard):not(#status-banner):not(#undo-row){ display:none !important; }
    #game-view{ height:100dvh; }
    .scoreboard{ flex:1; padding:14px; gap:14px; }
    .team-card{ display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:24px; }
    .team-card .tname{ font-size:clamp(14px,3vh,22px); }
    .team-card .tscore{ font-size:clamp(64px,min(38vh,26vw),280px); margin:6px 0; }
    .team-card .taction{ font-size:clamp(12px,2.4vh,18px); }
    .frisbee-badge{ width:clamp(24px,6vh,40px); height:clamp(13px,3.3vh,22px); margin-bottom:clamp(4px,1vh,8px); }

    #status-banner:not([hidden]){ margin:8px 14px 0; padding:6px 10px; font-size:clamp(11px,2.2vh,14px); border-radius:10px; }

    #undo-row{ padding:6px 0; display:flex; justify-content:center; }
    #undo-row .undo-btn{ width:auto; padding:8px 18px; border-radius:999px; }
    #undo-row .undo-label{ display:none; }
    #undo-row .undo-icon{ display:inline-block; }
  }
</style>
</head>
<body>
<div id="app">

  <section id="setup-view">
    <div class="eyebrow">Ultimate Game Log</div>
    <h1>Breakpoint</h1>

    <div class="field-label">Team names</div>
    <div class="name-row">
      <input class="name-input us" id="us-name-input" value="Us" maxlength="16">
      <input class="name-input them" id="them-name-input" value="Them" maxlength="16">
    </div>

    <div class="field-label">First point — we start on</div>
    <div class="choice-row" id="start-choice">
      <button class="choice-btn active" data-val="us">Offense<br>(we receive)</button>
      <button class="choice-btn" data-val="them">Defense<br>(we pull)</button>
    </div>

    <div class="field-label">Timeouts per team</div>
    <div class="stepper-row">
      <div></div>
      <div class="stepper" id="to-stepper" data-min="0" data-max="6">
        <button data-dir="-1">−</button><div class="val" id="to-val">2</div><button data-dir="1">+</button>
      </div>
    </div>

    <div class="field-label">Point cap</div>
    <div class="stepper-row">
      <div></div>
      <div class="stepper" id="cap-stepper" data-min="0" data-max="30">
        <button data-dir="-1">−</button><div class="val" id="cap-val">15</div><button data-dir="1">+</button>
      </div>
    </div>

    <button class="start-btn" id="start-game-btn">Start game</button>
  </section>

  <section id="game-view" hidden>
    <div class="top-bar">
      <button class="text-btn" id="end-game-btn">End game</button>
      <div class="point-label" id="point-label">Point 1</div>
    </div>

    <div class="status-banner" id="status-banner" hidden></div>

    <div class="scoreboard">
      <div class="team-card us" id="us-card">
        <div class="frisbee-badge" id="us-frisbee"></div>
        <div class="tname" id="us-name-disp">Us</div>
        <div class="tscore" id="us-score">0</div>
        <div class="taction" id="us-action">Score</div>
      </div>
      <div class="team-card them" id="them-card">
        <div class="frisbee-badge" id="them-frisbee"></div>
        <div class="tname" id="them-name-disp">Them</div>
        <div class="tscore" id="them-score">0</div>
        <div class="taction" id="them-action">Turn</div>
      </div>
    </div>

    <div class="undo-row" id="undo-row">
      <button class="undo-btn" id="undo-btn">
        <span class="undo-label">Undo last event</span><span class="undo-icon" aria-hidden="true">↺</span>
      </button>
    </div>

    <div class="timeouts-row">
      <button class="to-btn" id="us-to-btn">Timeout (2)</button>
      <button class="halftime-btn" id="halftime-btn">Set halftime</button>
      <button class="to-btn" id="them-to-btn">Timeout (2)</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="stats">Stats</button>
      <button class="tab-btn" data-tab="log">Log</button>
    </div>

    <div class="panel" id="stats-panel">
      <div class="subtoggle" id="stats-team-toggle">
        <button data-team="us">Us</button>
        <button class="active" data-team="both">Both</button>
        <button data-team="them">Them</button>
      </div>
      <div id="stats-content"></div>
    </div>

    <div class="panel" id="log-panel" hidden></div>
  </section>

  <section id="summary-view" hidden>
    <div class="top-bar">
      <button class="text-btn" id="back-to-game-btn">← Back to game</button>
    </div>
    <div class="summary-header">
      <div class="eyebrow">Final score</div>
      <div class="summary-score" id="summary-score">0–0</div>
      <div class="summary-names" id="summary-names">Us vs Them</div>
    </div>
    <div class="panel" id="summary-panel">
      <div class="subtoggle" id="summary-team-toggle">
        <button data-team="us">Us</button>
        <button class="active" data-team="both">Both</button>
        <button data-team="them">Them</button>
      </div>
      <div id="summary-stats-content"></div>
    </div>
    <div class="summary-actions">
      <button class="secondary-btn" id="export-btn">Export game data</button>
      <button class="start-btn" id="confirm-new-game-btn">Start new game</button>
    </div>
  </section>

</div>

<script>
(function(){
  const setupView = document.getElementById('setup-view');
  const gameView = document.getElementById('game-view');
  const summaryView = document.getElementById('summary-view');
  const STORE_KEY = 'breakpoint-game';

  let settings = null;   // { teamUs, teamThem, firstPossession, timeoutsPerTeam, pointCap }
  let actions = [];      // { type:'turn' } | { type:'score' } | { type:'timeout', team }

  // ---------- setup view interactions ----------
  let startChoice = 'us';
  document.querySelectorAll('#start-choice .choice-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      startChoice = btn.dataset.val;
      document.querySelectorAll('#start-choice .choice-btn').forEach(function(b){ b.classList.toggle('active', b===btn); });
    });
  });

  let timeoutsPerTeam = 2;
  let pointCap = 15;

  function wireStepper(stepperId, initial, valueFormatter, onChange){
    const stepperEl = document.getElementById(stepperId);
    const valEl = stepperEl.querySelector('.val');
    let val = initial;
    valEl.textContent = valueFormatter(val);
    stepperEl.querySelectorAll('button').forEach(function(btn){
      btn.addEventListener('click', function(){
        const min = +stepperEl.dataset.min, max = +stepperEl.dataset.max, dir = +btn.dataset.dir;
        val = Math.max(min, Math.min(max, val + dir));
        valEl.textContent = valueFormatter(val);
        onChange(val);
      });
    });
  }

  wireStepper('to-stepper', timeoutsPerTeam, function(v){ return v; }, function(v){ timeoutsPerTeam = v; });
  wireStepper('cap-stepper', pointCap, function(v){ return v===0 ? 'No cap' : v; }, function(v){ pointCap = v; });

  document.getElementById('start-game-btn').addEventListener('click', function(){
    const usName = document.getElementById('us-name-input').value.trim() || 'Us';
    const themName = document.getElementById('them-name-input').value.trim() || 'Them';
    settings = { teamUs: usName, teamThem: themName, firstPossession: startChoice, timeoutsPerTeam: timeoutsPerTeam, pointCap: pointCap };
    actions = [];
    persist();
    setupView.hidden = true; gameView.hidden = false;
    render();
  });

  // ---------- derive state from action log ----------
  function deriveState(){
    let scoreUs=0, scoreThem=0;
    let timeoutsUs=settings.timeoutsPerTeam, timeoutsThem=settings.timeoutsPerTeam;
    let points=[];
    let currentStart = settings.firstPossession;
    let currentPossession = currentStart;
    let currentEvents=[];
    const half = settings.pointCap ? Math.ceil(settings.pointCap/2) : null;
    let halftimeApplied = false;   // true once the O/D flip has been locked in
    let halftimePending = false;   // manual halftime called mid-point; flip applies once this point ends
    let halftimePointNum = null;   // point number after which the flip took effect (for banner/log divider)

    for(const a of actions){
      if(a.type==='turn'){
        currentEvents.push({type:'turn', team:currentPossession});
        currentPossession = currentPossession==='us' ? 'them' : 'us';
      } else if(a.type==='score'){
        currentEvents.push({type:'score', team:currentPossession});
        if(currentPossession==='us') scoreUs++; else scoreThem++;
        points.push({startSide:currentStart, scorer:currentPossession, events:currentEvents, scoreAfter:{us:scoreUs, them:scoreThem}});

        let nextStart = currentPossession==='us' ? 'them' : 'us'; // normal rule: loser of the point receives next
        if(!halftimeApplied){
          const crossedByScore = half!==null && (scoreUs>=half || scoreThem>=half);
          if(crossedByScore || halftimePending){
            // halftime swap: whoever received the game's opening pull now pulls, and vice versa
            nextStart = settings.firstPossession==='us' ? 'them' : 'us';
            halftimeApplied = true;
            halftimePointNum = points.length;
            halftimePending = false;
          }
        }
        currentStart = nextStart;
        currentPossession = currentStart;
        currentEvents=[];
      } else if(a.type==='timeout'){
        if(a.team==='us') timeoutsUs--; else timeoutsThem--;
        currentEvents.push({type:'timeout', team:a.team});
      } else if(a.type==='halftime'){
        if(!halftimeApplied){
          if(currentEvents.length===0){
            // between points: apply the flip immediately to the point about to start
            currentStart = settings.firstPossession==='us' ? 'them' : 'us';
            currentPossession = currentStart;
            halftimeApplied = true;
            halftimePointNum = points.length;
          } else {
            // mid-point (shouldn't normally happen — button is disabled then): defer to next point
            halftimePending = true;
          }
        }
      }
    }
    return { scoreUs, scoreThem, timeoutsUs, timeoutsThem, points, currentStart, currentPossession, currentEvents, halftimeApplied, halftimePointNum };
  }

  function isCapped(s){
    return settings.pointCap>0 && (s.scoreUs>=settings.pointCap || s.scoreThem>=settings.pointCap);
  }

  // ---------- streak / match point / universe point / halftime ----------
  const STREAK_THRESHOLD = 3;

  function computeStreak(s){
    const pts = s.points;
    if(pts.length===0) return { team:null, count:0 };
    const last = pts[pts.length-1].scorer;
    let count = 0;
    for(let i=pts.length-1; i>=0; i--){
      if(pts[i].scorer===last){ count++; } else { break; }
    }
    return { team:last, count:count };
  }

  // single status banner, priority: cap reached > universe point > match point > halftime > streak
  function getBanner(s){
    if(isCapped(s)){
      const winner = s.scoreUs>=settings.pointCap ? settings.teamUs : settings.teamThem;
      return { text: winner + ' reached the cap — ' + s.scoreUs + '–' + s.scoreThem, kind:'cap' };
    }
    const cap = settings.pointCap;
    if(cap>0){
      const usMatch = s.scoreUs===cap-1, themMatch = s.scoreThem===cap-1;
      if(usMatch && themMatch){ return { text:'Universe point — ' + s.scoreUs + '–' + s.scoreThem, kind:'universe' }; }
      if(usMatch){ return { text:'Match point — ' + settings.teamUs, kind:'match', team:'us' }; }
      if(themMatch){ return { text:'Match point — ' + settings.teamThem, kind:'match', team:'them' }; }
    }
    if(s.halftimePointNum!==null && s.points.length===s.halftimePointNum){
      return { text:'Halftime — ' + s.scoreUs + '–' + s.scoreThem, kind:'halftime' };
    }
    const streak = computeStreak(s);
    if(streak.count>=STREAK_THRESHOLD){
      const tname = streak.team==='us' ? settings.teamUs : settings.teamThem;
      return { text: tname + ' — ' + streak.count + ' in a row', kind:'streak', team:streak.team };
    }
    return null;
  }

  function addAction(a){
    actions.push(a);
    persist();
    const s = deriveState();
    render();
    if(isCapped(s)){
      renderSummary();
      gameView.hidden = true; summaryView.hidden = false;
    }
  }

  // ---------- persistence ----------
  function persist(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify({settings, actions})); }catch(e){}
  }
  function loadPersisted(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(!raw) return false;
      const data = JSON.parse(raw);
      if(!data.settings) return false;
      settings = data.settings;
      actions = data.actions || [];
      return true;
    }catch(e){ return false; }
  }

  // ---------- rendering ----------
  let activeTab = 'stats';
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b===btn); });
      document.getElementById('stats-panel').hidden = activeTab!=='stats';
      document.getElementById('log-panel').hidden = activeTab!=='log';
    });
  });

  let statsView = 'both';
  document.querySelectorAll('#stats-team-toggle button').forEach(function(btn){
    btn.addEventListener('click', function(){
      statsView = btn.dataset.team;
      document.querySelectorAll('#stats-team-toggle button').forEach(function(b){ b.classList.toggle('active', b===btn); });
      render();
    });
  });

  let summaryStatsView = 'both';
  document.querySelectorAll('#summary-team-toggle button').forEach(function(btn){
    btn.addEventListener('click', function(){
      summaryStatsView = btn.dataset.team;
      document.querySelectorAll('#summary-team-toggle button').forEach(function(b){ b.classList.toggle('active', b===btn); });
      renderSummary();
    });
  });

  function computeTeamStats(s, team){
    const other = team==='us' ? 'them' : 'us';
    const oPoints = s.points.filter(function(p){return p.startSide===team;});
    const oWins = oPoints.filter(function(p){return p.scorer===team;});
    const oCleanWins = oPoints.filter(function(p){return p.scorer===team && !p.events.some(function(e){return e.type==='turn';});});
    const dPoints = s.points.filter(function(p){return p.startSide===other;});
    const dWins = dPoints.filter(function(p){return p.scorer===team;});
    return { oPoints:oPoints.length, oWins:oWins.length, oCleanWins:oCleanWins.length, dPoints:dPoints.length, dWins:dWins.length };
  }

  function countTurnovers(s){
    let turnsUs=0, turnsThem=0;
    const allEvents = s.points.reduce(function(acc,p){return acc.concat(p.events);}, []).concat(s.currentEvents);
    allEvents.forEach(function(e){ if(e.type==='turn'){ if(e.team==='us') turnsUs++; else turnsThem++; } });
    return {turnsUs:turnsUs, turnsThem:turnsThem};
  }

  function statBlockHTML(s, team){
    const ts = computeTeamStats(s, team);
    let h = '';
    h += '<div class="stat-row"><div class="label">Offense (held)</div><div class="value">'+ts.oWins+'/'+ts.oPoints+' <span class="pct">'+pct(ts.oWins,ts.oPoints)+'</span></div></div>';
    h += '<div class="stat-row"><div class="label">Offense (clean — no turns)</div><div class="value">'+ts.oCleanWins+'/'+ts.oPoints+' <span class="pct">'+pct(ts.oCleanWins,ts.oPoints)+'</span></div></div>';
    h += '<div class="stat-row"><div class="label">Defense (broken)</div><div class="value">'+ts.dWins+'/'+ts.dPoints+' <span class="pct">'+pct(ts.dWins,ts.dPoints)+'</span></div></div>';
    return h;
  }

  function sharedStatsHTML(s){
    const t = countTurnovers(s);
    let h = '<div class="stat-section-label">Game</div>';
    h += '<div class="stat-row"><div class="label">Turnovers</div><div class="value">'+settings.teamUs+' '+t.turnsUs+' · '+settings.teamThem+' '+t.turnsThem+'</div></div>';
    h += '<div class="stat-row"><div class="label">Timeouts left</div><div class="value">'+s.timeoutsUs+' · '+s.timeoutsThem+'</div></div>';
    h += '<div class="stat-row"><div class="label">Points played</div><div class="value">'+s.points.length+'</div></div>';
    return h;
  }

  function cmpRow(label, leftVal, rightVal){
    return '<div class="cmp-row"><div class="cmp-val left">'+leftVal+'</div>'+
      '<div class="cmp-label">'+label+'</div>'+
      '<div class="cmp-val right">'+rightVal+'</div></div>';
  }

  function bothStatsHTML(s){
    const tsUs = computeTeamStats(s,'us'), tsThem = computeTeamStats(s,'them');
    const t = countTurnovers(s);
    let h = '<div class="cmp-header"><span class="us">'+settings.teamUs+'</span><span class="them">'+settings.teamThem+'</span></div>';
    h += cmpRow('Offense (held)',
      tsUs.oWins+'/'+tsUs.oPoints+' <span class="pct">'+pct(tsUs.oWins,tsUs.oPoints)+'</span>',
      tsThem.oWins+'/'+tsThem.oPoints+' <span class="pct">'+pct(tsThem.oWins,tsThem.oPoints)+'</span>');
    h += cmpRow('Offense (clean)',
      tsUs.oCleanWins+'/'+tsUs.oPoints+' <span class="pct">'+pct(tsUs.oCleanWins,tsUs.oPoints)+'</span>',
      tsThem.oCleanWins+'/'+tsThem.oPoints+' <span class="pct">'+pct(tsThem.oCleanWins,tsThem.oPoints)+'</span>');
    h += cmpRow('Defense (broken)',
      tsUs.dWins+'/'+tsUs.dPoints+' <span class="pct">'+pct(tsUs.dWins,tsUs.dPoints)+'</span>',
      tsThem.dWins+'/'+tsThem.dPoints+' <span class="pct">'+pct(tsThem.dWins,tsThem.dPoints)+'</span>');
    h += cmpRow('Turnovers', t.turnsUs, t.turnsThem);
    h += cmpRow('Timeouts left', s.timeoutsUs, s.timeoutsThem);
    h += '<div class="stat-row"><div class="label">Points played</div><div class="value">'+s.points.length+'</div></div>';
    return h;
  }

  function renderStatsBlock(containerId, s, view){
    const wrap = document.getElementById(containerId);
    let html = '';
    if(view==='both'){
      html = bothStatsHTML(s);
    } else {
      html = statBlockHTML(s, view) + sharedStatsHTML(s);
    }
    wrap.innerHTML = html;
  }

  function render(){
    const s = deriveState();
    const capped = isCapped(s);

    document.getElementById('us-name-disp').textContent = settings.teamUs;
    document.getElementById('them-name-disp').textContent = settings.teamThem;
    document.getElementById('us-score').textContent = s.scoreUs;
    document.getElementById('them-score').textContent = s.scoreThem;
    document.getElementById('us-to-btn').textContent = 'Timeout (' + s.timeoutsUs + ')';
    document.getElementById('them-to-btn').textContent = 'Timeout (' + s.timeoutsThem + ')';
    document.getElementById('us-to-btn').disabled = s.timeoutsUs<=0 || capped;
    document.getElementById('them-to-btn').disabled = s.timeoutsThem<=0 || capped;
    document.getElementById('halftime-btn').disabled = capped || s.halftimeApplied || s.currentEvents.length>0;

    document.getElementById('point-label').textContent = 'Point ' + (s.points.length+1) + (settings.pointCap ? ' · Cap ' + settings.pointCap : '');

    const usCard = document.getElementById('us-card');
    const themCard = document.getElementById('them-card');
    const usAction = document.getElementById('us-action');
    const themAction = document.getElementById('them-action');

    if(capped){
      usCard.className = 'team-card us';
      themCard.className = 'team-card them';
      usAction.textContent = '';
      themAction.textContent = '';
    } else if(s.currentPossession==='us'){
      usCard.className = 'team-card us active-poss';
      themCard.className = 'team-card them waiting';
      usAction.textContent = 'Score';
      themAction.textContent = 'Turn';
    } else {
      usCard.className = 'team-card us waiting';
      themCard.className = 'team-card them active-poss';
      usAction.textContent = 'Turn';
      themAction.textContent = 'Score';
    }

    const statusBanner = document.getElementById('status-banner');
    const banner = getBanner(s);
    if(banner){
      statusBanner.textContent = banner.text;
      statusBanner.className = 'status-banner' + (banner.team ? ' accent-'+banner.team : '');
      statusBanner.hidden = false;
    } else {
      statusBanner.hidden = true;
    }

    const undoDisabled = actions.length===0;
    document.getElementById('undo-btn').disabled = undoDisabled;

    renderStatsBlock('stats-content', s, statsView);
    renderLog(s);
  }

  function pct(num, den){ return den ? Math.round(num/den*100)+'%' : '—'; }

  function renderLog(s){
    const logPanel = document.getElementById('log-panel');
    const allPoints = s.points.slice().reverse();
    const haltNum = s.halftimePointNum;
    let html = '';
    if(s.currentEvents.length>0 || actions.length>0){
      html += pointEntryHTML(s.points.length+1, s.currentStart, s.currentEvents, null, true, {us:s.scoreUs, them:s.scoreThem});
    }
    allPoints.forEach(function(p, idx){
      const num = s.points.length - idx;
      html += pointEntryHTML(num, p.startSide, p.events, p.scorer, false, p.scoreAfter);
      if(haltNum!==null && num===haltNum){
        html += '<div class="halftime-divider"><span>Halftime · '+p.scoreAfter.us+'–'+p.scoreAfter.them+'</span></div>';
      }
    });
    if(!html){ html = '<div class="empty-note">No events yet — tap a team to begin logging the first point.</div>'; }
    logPanel.innerHTML = html;
  }

  function pointEntryHTML(num, startSide, events, scorer, inProgress, scoreSnapshot){
    const startLabel = startSide==='us' ? settings.teamUs+' O' : settings.teamUs+' D';
    let dots = '';
    events.forEach(function(e){
      if(e.type==='turn'){ dots += '<div class="dot '+e.team+'"></div>'; }
      else if(e.type==='timeout'){ dots += '<div class="dot to"></div>'; }
      else if(e.type==='score'){ dots += '<div class="dot final '+e.team+'"></div>'; }
    });
    if(!dots){ dots = '<div class="dot" style="background:var(--ink-dim);opacity:.4"></div>'; }
    const outcome = inProgress ? 'In progress' : (scorer==='us'?settings.teamUs:settings.teamThem)+' scores';
    const scoreText = scoreSnapshot.us + '–' + scoreSnapshot.them;
    return '<div class="point-entry"><div class="pe-top"><div class="pe-num">Point '+num+' · '+startLabel+'</div>'+
      '<div class="pe-right"><div class="pe-outcome">'+outcome+'</div><div class="pe-runscore">'+scoreText+'</div></div></div>'+
      '<div class="pe-dots">'+dots+'</div></div>';
  }

  // ---------- live actions: tap a team card to score (if they have it) or turn (if they don't) ----------
  document.querySelectorAll('.team-card').forEach(function(card){
    card.addEventListener('click', function(){
      const s = deriveState();
      if(isCapped(s)) return;
      const team = card.id==='us-card' ? 'us' : 'them';
      if(s.currentPossession===team){ addAction({type:'score'}); }
      else { addAction({type:'turn'}); }
    });
  });

  document.getElementById('us-to-btn').addEventListener('click', function(){
    const s = deriveState();
    if(isCapped(s)) return;
    addAction({type:'timeout', team:'us'});
  });
  document.getElementById('them-to-btn').addEventListener('click', function(){
    const s = deriveState();
    if(isCapped(s)) return;
    addAction({type:'timeout', team:'them'});
  });
  document.getElementById('halftime-btn').addEventListener('click', function(){
    const s = deriveState();
    if(isCapped(s) || s.halftimeApplied || s.currentEvents.length>0) return;
    addAction({type:'halftime'});
  });

  function undo(){
    if(actions.length===0) return;
    actions.pop();
    persist();
    render();
  }
  document.getElementById('undo-btn').addEventListener('click', undo);

  // ---------- end game -> summary -> new game ----------
  function renderSummary(){
    const s = deriveState();
    document.getElementById('summary-score').textContent = s.scoreUs + '–' + s.scoreThem;
    document.getElementById('summary-names').textContent = settings.teamUs + ' vs ' + settings.teamThem;
    renderStatsBlock('summary-stats-content', s, summaryStatsView);
  }

  document.getElementById('end-game-btn').addEventListener('click', function(){
    renderSummary();
    gameView.hidden = true; summaryView.hidden = false;
  });

  document.getElementById('back-to-game-btn').addEventListener('click', function(){
    summaryView.hidden = true; gameView.hidden = false;
    render();
  });

  document.getElementById('confirm-new-game-btn').addEventListener('click', function(){
    document.getElementById('us-name-input').value = settings.teamUs;
    document.getElementById('them-name-input').value = settings.teamThem;
    try{ localStorage.removeItem(STORE_KEY); }catch(e){}
    settings = null; actions = [];
    summaryView.hidden = true; setupView.hidden = false;
  });

  // ---------- export ----------
  function csvEscape(val){
    const str = String(val);
    if(/[",\r\n]/.test(str)){ return '"'+str.replace(/"/g,'""')+'"'; }
    return str;
  }
  function toCSV(rows){
    return rows.map(function(r){ return r.map(csvEscape).join(','); }).join('\r\n');
  }

  function buildSummaryCSV(s){
    const tsUs = computeTeamStats(s,'us');
    const t = countTurnovers(s);
    const rows = [
      ['Date','Us','Them','Score Us','Score Them','O Held %','O Clean %','D Broken %','Turnovers Us','Turnovers Them','Points Played'],
      [new Date().toISOString().slice(0,10), settings.teamUs, settings.teamThem, s.scoreUs, s.scoreThem,
       pct(tsUs.oWins,tsUs.oPoints), pct(tsUs.oCleanWins,tsUs.oPoints), pct(tsUs.dWins,tsUs.dPoints),
       t.turnsUs, t.turnsThem, s.points.length]
    ];
    return toCSV(rows);
  }

  function buildPointsCSV(s){
    const rows = [['Point','Start Side','Turnovers','Timeouts','Scorer','Score After','Sequence']];
    s.points.forEach(function(p, i){
      let turns=0, tos=0;
      const seq = [];
      p.events.forEach(function(e){
        const tname = e.team==='us' ? settings.teamUs : settings.teamThem;
        if(e.type==='turn'){ turns++; seq.push('Turn:'+tname); }
        else if(e.type==='timeout'){ tos++; seq.push('Timeout:'+tname); }
        else if(e.type==='score'){ seq.push('Score:'+tname); }
      });
      const startLabel = p.startSide==='us' ? settings.teamUs+' O' : settings.teamUs+' D';
      const scorerName = p.scorer==='us' ? settings.teamUs : settings.teamThem;
      rows.push([i+1, startLabel, turns, tos, scorerName, p.scoreAfter.us+'-'+p.scoreAfter.them, seq.join(' | ')]);
    });
    return toCSV(rows);
  }

  function downloadFile(file){
    const url = URL.createObjectURL(file);
    const a = document.createElement('a');
    a.href = url; a.download = file.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  document.getElementById('export-btn').addEventListener('click', async function(){
    const s = deriveState();
    const dateStr = new Date().toISOString().slice(0,10);
    const summaryFile = new File([buildSummaryCSV(s)], 'breakpoint-summary-'+dateStr+'.csv', {type:'text/csv'});
    const pointsFile = new File([buildPointsCSV(s)], 'breakpoint-points-'+dateStr+'.csv', {type:'text/csv'});

    if(navigator.canShare && navigator.canShare({files:[summaryFile, pointsFile]})){
      try{
        await navigator.share({files:[summaryFile, pointsFile], title:'Breakpoint game export'});
        return;
      }catch(e){ /* cancelled or failed — fall through to direct download */ }
    }
    downloadFile(summaryFile);
    downloadFile(pointsFile);
  });

  // ---------- boot ----------
  if(loadPersisted()){
    setupView.hidden = true; gameView.hidden = false;
    render();
  }
})();
</script>
</body>
</html>
